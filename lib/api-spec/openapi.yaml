        - { name: user_id,    in: query, schema: { type: integer } }
        - { name: module,     in: query, schema: { type: string } }
        - { name: action,     in: query, schema: { type: string } }
        - { name: entite_id,  in: query, schema: { type: integer } }
        - { name: entite_type,in: query, schema: { type: string } }
        - { name: date_debut, in: query, schema: { type: string, format: date } }
        - { name: date_fin,   in: query, schema: { type: string, format: date } }
        - { name: recherche,  in: query, schema: { type: string } }
        - { name: limit,      in: query, schema: { type: integer } }
        - { name: offset,     in: query, schema: { type: integer } }
      responses:
        "200":
          description: Journal d'audit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditJournalResponse"

  /audit/entite/{type}/{id}:
    get:
      summary: Historique d'une entité spécifique
      tags: [audit]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: type, in: path, required: true, schema: { type: string } }
        - { name: id,   in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Historique entité
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEntiteResponse"

  /audit/user/{id}:
    get:
      summary: Actions d'un utilisateur
      tags: [audit]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id,    in: path,  required: true, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Actions utilisateur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditUserActionsResponse"

  /audit/sessions:
    get:
      summary: Liste des sessions utilisateurs
      tags: [audit]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: limit, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditSessionsResponse"

  /audit/stats:
    get:
      summary: Statistiques du journal d'audit
      tags: [audit]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Statistiques audit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditStats"

  /audit/export-pdf:
    get:
      summary: Export PDF signé du journal d'audit
      tags: [audit]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: date_debut, in: query, schema: { type: string, format: date } }
        - { name: date_fin,   in: query, schema: { type: string, format: date } }
        - { name: module,     in: query, schema: { type: string } }
        - { name: user_id,    in: query, schema: { type: integer } }
      responses:
        "200":
          description: PDF généré
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /audit/modifications/{entite_type}/{entite_id}:
    get:
      summary: Historique des modifications (avant/après) d'une entité
      tags: [audit]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: entite_type, in: path, required: true, schema: { type: string } }
        - { name: entite_id,   in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Modifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditModificationsResponse"

components:
  schemas:

    BudgetCampagne:
      type: object
      required: [id, cooperative_id, campagne_id, statut, created_at, updated_at]
      properties:
        id:
          type: integer
        cooperative_id:
          type: integer
        campagne_id:
          type: integer
        statut:
          type: string
          enum: [brouillon, valide, cloture]
        valide_par:
          type: ["integer", "null"]
        date_validation:
          type: ["string", "null"]
        created_at:
          type: string
        updated_at:
          type: string

    LigneBudget:
      type: object
      required: [id, budget_id, categorie, libelle, montant_previsionnel_fcfa, montant_realise_fcfa, ordre]
      properties:
        id:
          type: integer
        budget_id:
          type: integer
        categorie:
          type: string
          enum: [recette, charge_achat, charge_exploitation, charge_personnel, charge_financiere, investissement]
        libelle:
          type: string
        montant_previsionnel_fcfa:
          type: string
        montant_realise_fcfa:
          type: string
        ecart_fcfa:
          type: ["string", "null"]
        ecart_pct:
          type: ["string", "null"]
        ordre:
          type: integer
        created_at:
          type: string

    HypotheseBudget:
      type: object
      required: [id, budget_id]
      properties:
        id:
          type: integer
        budget_id:
          type: integer
        tonnage_previsionnel_kg:
          type: ["string", "null"]
        prix_achat_moyen_fcfa:
          type: ["string", "null"]
        prix_vente_moyen_fcfa:
          type: ["string", "null"]
        nb_membres_actifs:
          type: ["integer", "null"]
        nb_livraisons_estimees:
          type: ["integer", "null"]
        marge_brute_estimee_fcfa:
          type: ["string", "null"]

    BudgetResponse:
      type: object
      required: [budget, cree]
      properties:
        budget:
          $ref: "#/components/schemas/BudgetCampagne"
        cree:
          type: boolean

    BudgetDetail:
      type: object
      required: [budget, lignes, totaux, resultat]
      properties:
        budget:
          $ref: "#/components/schemas/BudgetCampagne"
        lignes:
          type: array
          items:
            $ref: "#/components/schemas/LigneBudget"
        hypotheses:
          oneOf:
            - $ref: "#/components/schemas/HypotheseBudget"
            - type: "null"
        totaux:
          type: object
          additionalProperties:
            type: object
            properties:
              previsionnel:
                type: number
              realise:
                type: number
        resultat:
          type: object
          properties:
            previsionnel:
              type: number
            realise:
              type: number

    ModifierLigneInput:
      type: object
      required: [ligneId]
      properties:
        ligneId:
          type: integer
        montantPrevisionnelFcfa:
          type: number
        libelle:
          type: string
        ordre:
          type: integer

    HypothesesInput:
      type: object
      properties:
        tonnagePrevisionnelKg:
          type: number
        prixAchatMoyenFcfa:
          type: number
        prixVenteMoyenFcfa:
          type: number
        nbMembresActifs:
          type: integer
        nbLivraisonsEstimees:
          type: integer

    RapportBudget:
      type: object
      required: [parCategorie, totalPrev, totalReel, tauxExecution]
      properties:
        parCategorie:
          type: object
          additionalProperties:
            type: object
            properties:
              totalPrev:
                type: number
              totalReel:
                type: number
              ecartPct:
                type: number
              lignes:
                type: array
                items:
                  $ref: "#/components/schemas/LigneBudget"
        totalPrev:
          type: number
        totalReel:
          type: number
        tauxExecution:
          type: number


    Devise:
      type: object
      required: [id, code, libelle, symbole, actif]
      properties:
        id:
          type: integer
        code:
          type: string
        libelle:
          type: string
        symbole:
          type: string
        actif:
          type: boolean

    TauxChange:
      type: object
      required: [id, cooperative_id, devise_source, devise_cible, taux, date_application, source_taux, created_at]
