openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CoopDigital — API de gestion des coopératives cacaoyères
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: membres
  - name: avances
  - name: livraisons
  - name: dashboard
  - name: lots
  - name: stocks
  - name: exportateurs
  - name: communication
  - name: comptabilite
  - name: etats-financiers
  - name: rapports
  - name: users
  - name: salaires
  - name: intrants

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Connexion utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Identifiants invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /membres:
    get:
      operationId: getMembres
      tags: [membres]
      summary: Liste paginée des membres
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: search
          in: query
          schema: { type: string }
        - name: statut
          in: query
          schema: { type: string, enum: [actif, inactif] }
      responses:
        "200":
          description: Liste des membres
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembrePagination"
    post:
      operationId: createMembre
      tags: [membres]
      summary: Créer un membre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembreInput"
      responses:
        "201":
          description: Membre créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membre"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /membres/qr/{token}:
    get:
      operationId: getMembreByQr
      tags: [membres]
      summary: Lookup membre par QR code
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Membre trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membre"
        "404":
          description: Non trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /membres/{id}:
    get:
      operationId: getMembreById
      tags: [membres]
      summary: Fiche complète d'un membre
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Membre trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membre"
        "404":
          description: Non trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMembre
      tags: [membres]
      summary: Modifier un membre
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembreUpdate"
      responses:
        "200":
          description: Membre modifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membre"

  /membres/{id}/historique:
    get:
      operationId: getMembreHistorique
      tags: [membres]
      summary: Historique livraisons, avances et paiements d'un membre
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Historique du membre
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembreHistorique"

  /avances:
    get:
      operationId: getAvances
      tags: [avances]
      summary: Liste des avances
      parameters:
        - name: statut
          in: query
          schema: { type: string, enum: [en_cours, rembourse, en_retard] }
        - name: membre_id
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Liste des avances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvancePagination"
    post:
      operationId: createAvance
      tags: [avances]
      summary: Octroyer une avance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvanceInput"
      responses:
        "201":
          description: Avance octroyée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Avance"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /avances/encours:
    get:
      operationId: getAvancesEncours
      tags: [avances]
      summary: Tableau de bord avances en cours
      responses:
        "200":
          description: Résumé avances en cours
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvancesEncours"

  /avances/{id}/rembourser:
    put:
      operationId: rembourserAvance
      tags: [avances]
      summary: Remboursement partiel ou total d'une avance
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemboursementInput"
      responses:
        "200":
          description: Avance mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Avance"
        "404":
          description: Non trouvée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /livraisons:
    get:
      operationId: getLivraisons
      tags: [livraisons]
      summary: Liste des livraisons
      parameters:
        - name: membre_id
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Liste des livraisons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LivraisonDetail"
    post:
      operationId: createLivraison
      tags: [livraisons]
      summary: Enregistrer une livraison avec déduction d'avance automatique
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LivraisonInput"
      responses:
        "201":
          description: Livraison enregistrée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivraisonResult"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /livraisons/non-lotees:
    get:
      operationId: getLivraisonsNonLotees
      tags: [livraisons]
      summary: Livraisons non encore affectées à un lot
      responses:
        "200":
          description: Livraisons disponibles pour création de lot
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LivraisonDetail"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: KPIs du tableau de bord
      responses:
        "200":
          description: Indicateurs clés
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpi"

  /dashboard/livraisons:
    get:
      operationId: getDashboardLivraisons
      tags: [dashboard]
      summary: Dernières livraisons (5)
      responses:
        "200":
          description: Dernières livraisons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LivraisonDetail"

  /dashboard/avances-retard:
    get:
      operationId: getDashboardAvancesRetard
      tags: [dashboard]
      summary: Avances en retard
      responses:
        "200":
          description: Avances en retard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Avance"

  # ── M02 Traçabilité ────────────────────────────────────────────
  /lots:
    get:
      operationId: getLots
      tags: [lots]
      summary: Liste des lots
      parameters:
        - name: statut
          in: query
          schema: { type: string, enum: [en_stock, vendu, transit] }
      responses:
        "200":
          description: Liste des lots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LotDetail"
    post:
      operationId: createLot
      tags: [lots]
      summary: Créer un lot à partir de livraisons
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LotInput"
      responses:
        "201":
          description: Lot créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LotDetail"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lots/qr/{code}:
    get:
      operationId: getLotByQr
      tags: [lots]
      summary: Lookup lot par QR code
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Lot trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LotDetail"
        "404":
          description: Non trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lots/{id}/statut:
    put:
      operationId: updateLotStatut
      tags: [lots]
      summary: Changer le statut d'un lot
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LotStatutInput"
      responses:
        "200":
          description: Statut mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LotDetail"
        "404":
          description: Non trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lots/{id}/tracabilite:
    get:
      operationId: getLotTracabilite
      tags: [lots]
      summary: Chaîne complète de traçabilité d'un lot
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Chaîne de traçabilité
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LotTracabilite"
        "404":
          description: Non trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── M03 Stocks ────────────────────────────────────────────────
  /stocks/entrepots:
    get:
      operationId: getEntrepots
      tags: [stocks]
      summary: Liste des entrepôts avec stock actuel calculé
      responses:
        "200":
          description: Entrepôts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EntrepotStock"

  /stocks/mouvements:
    get:
      operationId: getMouvementsStock
      tags: [stocks]
      summary: Journal des mouvements de stock
      parameters:
        - name: entrepot_id
          in: query
          schema: { type: integer }
        - name: date_debut
          in: query
          schema: { type: string }
        - name: date_fin
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Mouvements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MouvementStock"

  /stocks/entree:
    post:
      operationId: entreeStock
      tags: [stocks]
      summary: Entrée manuelle en stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MouvementInput"
      responses:
        "201":
          description: Mouvement enregistré
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MouvementStock"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stocks/sortie:
    post:
      operationId: sortieStock
      tags: [stocks]
      summary: Sortie de stock vers exportateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MouvementInput"
      responses:
        "201":
          description: Mouvement enregistré
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MouvementStock"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stocks/alertes:
    get:
      operationId: getStockAlertes
      tags: [stocks]
      summary: Entrepôts sous seuil minimum
      responses:
        "200":
          description: Alertes stock
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EntrepotStock"

  # ── M04 étendu Exportateurs ───────────────────────────────────
  /exportateurs:
    get:
      operationId: getExportateurs
      tags: [exportateurs]
      summary: Liste des exportateurs avec solde créances
      responses:
        "200":
          description: Exportateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExportateurDetail"
    post:
      operationId: createExportateur
      tags: [exportateurs]
      summary: Créer un exportateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportateurInput"
      responses:
        "201":
          description: Exportateur créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportateurDetail"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /exportateurs/{id}:
    get:
      operationId: getExportateurById
      tags: [exportateurs]
      summary: Détail exportateur avec historique ventes
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Exportateur trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportateurHistorique"
        "404":
          description: Non trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ventes:
    get:
      operationId: getVentes
      tags: [exportateurs]
      summary: Liste des ventes
      parameters:
        - name: exportateur_id
          in: query
          schema: { type: integer }
        - name: statut
          in: query
          schema: { type: string, enum: [en_attente, partiel, regle, en_retard] }
      responses:
        "200":
          description: Ventes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VenteDetail"
    post:
      operationId: createVente
      tags: [exportateurs]
      summary: Enregistrer une vente à crédit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VenteInput"
      responses:
        "201":
          description: Vente enregistrée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VenteDetail"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ventes/creances:
    get:
      operationId: getCreances
      tags: [exportateurs]
      summary: Tableau des créances (dû, en retard, à échoir)
      responses:
        "200":
          description: Créances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreancesSummary"

  /ventes/{id}/encaissement:
    put:
      operationId: encaisserVente
      tags: [exportateurs]
      summary: Enregistrer un paiement reçu sur une vente
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EncaissementInput"
      responses:
        "200":
          description: Vente mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VenteDetail"
        "404":
          description: Non trouvée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── M07 Communication ─────────────────────────────────────────
  /communication/sms-groupe:
    post:
      operationId: sendSmsGroupe
      tags: [communication]
      summary: Envoyer un SMS groupé aux membres
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmsGroupeInput"
      responses:
        "200":
          description: SMS envoyé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsGroupeResult"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /communication/historique:
    get:
      operationId: getCommunicationHistorique
      tags: [communication]
      summary: Historique des envois SMS
      responses:
        "200":
          description: Historique
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SmsHistorique"

  # ── M05 Comptabilité ─────────────────────────────────────────
  /comptabilite/grand-livre:
    get:
      operationId: getGrandLivre
      tags: [comptabilite]
      summary: Grand-livre – toutes les écritures
      parameters:
        - name: compte
          in: query
          schema: { type: string }
        - name: date_debut
          in: query
          schema: { type: string }
        - name: date_fin
          in: query
          schema: { type: string }
        - name: exercice
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Liste paginée des écritures
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrandLivrePage"
        "401":
          description: Non authentifié

  /comptabilite/balance:
    get:
      operationId: getBalance
      tags: [comptabilite]
      summary: Balance des comptes (débit / crédit / solde)
      parameters:
        - name: exercice
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Balance par compte
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BalanceLigne"
        "401":
          description: Non authentifié

  /comptabilite/journal:
    get:
      operationId: getJournalComptable
      tags: [comptabilite]
      summary: Journal comptable chronologique
      parameters:
        - name: exercice
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Journal paginé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrandLivrePage"
        "401":
          description: Non authentifié

  /comptabilite/ecriture:
    post:
      operationId: createEcritureManuelle
      tags: [comptabilite]
      summary: Écriture manuelle (admin uniquement)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EcritureManuelleInput"
      responses:
        "201":
          description: Écriture créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EcritureComptable"
        "401":
          description: Non authentifié

  /comptabilite/marge-collecte:
    get:
      operationId: getMargeCollecte
      tags: [comptabilite]
      summary: Marge de collecte (CA – achats – charges)
      parameters:
        - name: exercice
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Marge de collecte
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MargeCollecte"
        "401":
          description: Non authentifié

  /comptabilite/tresorerie:
    get:
      operationId: getTresorerie
      tags: [comptabilite]
      summary: Soldes Banque + Caisse en temps réel
      responses:
        "200":
          description: Situation de trésorerie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tresorerie"
        "401":
          description: Non authentifié

  # ── Config comptable & écritures en attente ──────────────────
  /comptabilite/config:
    get:
      operationId: getConfigComptable
      tags: [comptabilite]
      summary: Récupère la configuration comptable de la coopérative
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Configuration comptable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigComptable"
        "401":
          description: Non authentifié
    put:
      operationId: updateConfigComptable
      tags: [comptabilite]
      summary: Met à jour la configuration comptable
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConfigComptableInput"
      responses:
        "200":
          description: Configuration mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigComptable"
        "401":
          description: Non authentifié

  /comptabilite/en-attente/count:
    get:
      operationId: countEcrituresEnAttente
      tags: [comptabilite]
      summary: Nombre d'écritures en attente de validation
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Compteur
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer
        "401":
          description: Non authentifié

  /comptabilite/en-attente:
    get:
      operationId: listEcrituresEnAttente
