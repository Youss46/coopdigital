        entite_id:       { type: integer, nullable: true }
        valeurs_avant:   { type: object, nullable: true }
        valeurs_apres:   { type: object, nullable: true }
        champs_modifies: { type: array, items: { type: string }, nullable: true }
        description:     { type: string, nullable: true }
        ip_address:      { type: string, nullable: true }
        session_id:      { type: string, nullable: true }
        campagne_id:     { type: integer, nullable: true }
        created_at:      { type: string, format: date-time }

    AuditJournalResponse:
      type: object
      required: [entries, total, limit, offset]
      properties:
        entries: { type: array, items: { $ref: "#/components/schemas/AuditEntry" } }
        total:   { type: integer }
        limit:   { type: integer }
        offset:  { type: integer }

    AuditEntiteResponse:
      type: object
      required: [entries]
      properties:
        entries: { type: array, items: { $ref: "#/components/schemas/AuditEntry" } }

    AuditUserActionsResponse:
      type: object
      required: [entries]
      properties:
        entries: { type: array, items: { $ref: "#/components/schemas/AuditEntry" } }

    AuditModificationsItem:
      type: object
      required: [id, created_at]
      properties:
        id:              { type: integer }
        user_id:         { type: integer, nullable: true }
        user_nom:        { type: string, nullable: true }
        user_role:       { type: string, nullable: true }
        created_at:      { type: string, format: date-time }
        champs_modifies: { type: array, items: { type: string }, nullable: true }
        valeurs_avant:   { type: object, nullable: true }
        valeurs_apres:   { type: object, nullable: true }

    AuditModificationsResponse:
      type: object
      required: [modifications]
      properties:
        modifications: { type: array, items: { $ref: "#/components/schemas/AuditModificationsItem" } }

    AuditStats:
      type: object
      required: [nb_actions_aujourd_hui, nb_actions_semaine, actions_par_module, actions_par_user, modifications_critiques, evolution_horaire]
      properties:
        nb_actions_aujourd_hui: { type: integer }
        nb_actions_semaine:     { type: integer }
        actions_par_module:
          type: array
          items:
            type: object
            required: [module, nb]
            properties:
              module: { type: string }
              nb:     { type: integer }
        actions_par_user:
          type: array
          items:
            type: object
            required: [nb]
            properties:
              userId: { type: integer, nullable: true }
              nom:    { type: string, nullable: true }
              role:   { type: string, nullable: true }
              nb:     { type: integer }
        modifications_critiques:
          type: array
          items: { $ref: "#/components/schemas/AuditEntry" }
        evolution_horaire:
          type: array
          items:
            type: object
            required: [heure, nb]
            properties:
              heure: { type: string }
              nb:    { type: integer }

    AuditSession:
      type: object
      required: [id, user_id, session_token, date_connexion, nb_actions, statut]
      properties:
        id:               { type: integer }
        cooperative_id:   { type: integer, nullable: true }
        user_id:          { type: integer }
        session_token:    { type: string }
        ip_address:       { type: string, nullable: true }
        user_agent:       { type: string, nullable: true }
        date_connexion:   { type: string, format: date-time }
        date_deconnexion: { type: string, format: date-time, nullable: true }
        duree_session_min: { type: integer, nullable: true }
        nb_actions:       { type: integer }
        statut:           { type: string, enum: [active, expiree, deconnectee] }

    AuditSessionsResponse:
      type: object
      required: [sessions]
      properties:
        sessions: { type: array, items: { $ref: "#/components/schemas/AuditSession" } }